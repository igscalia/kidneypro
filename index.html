      {drug:'Ondansetron (Zofran)',route:'PO/IV',use:'First-line antiemetic in CKD — hepatic, no dose adjustment',std:'4–8mg TDS (PO or IV); max 8mg per dose IV (QTc risk)',ckd3:{d:'4–8mg TDS ✓',f:'safe'},ckd4:{d:'4–8mg TDS ✓',f:'safe'},ckd5:{d:'4–8mg TDS ✓ (hepatic elimination)',f:'safe'},hd:{d:'4–8mg TDS ✓ (not HD-cleared); monitor QTc in HD',f:'safe'},pd:{d:'4–8mg TDS ✓',f:'safe'},note:'Preferred antiemetic in CKD. Hepatic metabolism. No dose adjustment at any CKD/dialysis stage. Monitor QTc in HD patients — baseline ECG if multiple QTc-prolonging agents. Max single IV dose 8mg to reduce QTc risk.',src:'eTG + UpToDate'},
      {drug:'Metoclopramide (Maxolon)',route:'PO/IV',use:'Antiemetic/prokinetic — reduce in CKD4/5 (renal clearance)',std:'10mg TDS (standard)',ckd3:{d:'10mg TDS — reduce to BD–TDS if eGFR <30',f:'adjust'},ckd4:{d:'5mg TDS; risk of dystonic reactions (worse in uraemia)',f:'adjust'},ckd5:{d:'5mg BD; dystonic reactions more frequent; limit use',f:'caution'},hd:{d:'2.5–5mg TDS; post-HD; significant extrapyramidal risk',f:'caution'},pd:{d:'5mg BD–TDS; caution — CNS effects amplified',f:'caution'},note:'Renally eliminated. Dystonic reactions (acute extrapyramidal effects) are more frequent in CKD — especially in elderly. Use short courses only. Ondansetron is generally preferred in CKD4/5. Avoid concurrent antidopaminergics.',src:'eTG + UpToDate'},
      {drug:'Prochlorperazine (Stemetil)',route:'PO/IM',use:'Antiemetic/anti-vertigo — caution in CKD4/5',std:'5–10mg TDS (PO); 12.5mg IM PRN',ckd3:{d:'Standard dose with caution',f:'adjust'},ckd4:{d:'Reduce dose; CNS effects amplified in uraemia',f:'caution'},ckd5:{d:'Use with caution — sedation and extrapyramidal effects ↑',f:'caution'},hd:{d:'Use with caution; limit dose; sedation risk',f:'caution'},pd:{d:'Use with caution; start low',f:'caution'},note:'Hepatically metabolised but CNS side effects (sedation, extrapyramidal effects) are amplified in uraemia. Use the lowest effective dose. Ondansetron preferred in CKD4/5.',src:'eTG'},
      {drug:'Domperidone (Motilium)',route:'PO',use:'Antiemetic/prokinetic — dose reduce in CKD (50%)',std:'10mg TDS standard; max 30mg/day',ckd3:{d:'10mg TDS; caution eGFR <30',f:'adjust'},ckd4:{d:'5mg TDS (50% dose reduction)',f:'adjust'},ckd5:{d:'5mg BD–TDS; dose reduce; QTc monitoring',f:'adjust'},hd:{d:'5mg BD (50% reduction); QTc risk in HD',f:'adjust'},pd:{d:'5mg BD–TDS (50% reduction)',f:'adjust'},note:'Hepatic metabolism but renal elimination of inactive metabolites — dose reduce in CKD. QTc prolongation risk (especially in HD). Avoid concurrent QTc-prolonging agents.',src:'UpToDate'},
      {drug:'━━━ VTE PROPHYLAXIS ━━━',isHeader:true,route:'',use:'',std:'',ckd3:{d:'',f:'safe'},ckd4:{d:'',f:'safe'},ckd5:{d:'',f:'safe'},hd:{d:'',f:'safe'},pd:{d:'',f:'safe'},note:'',src:'eTG'},
      {drug:'Enoxaparin 40mg (Prophylactic)',route:'SC',use:'Standard VTE prophylaxis — dose reduce in CKD4; AVOID CKD5/HD',std:'40mg SC daily (standard)',ckd3:{d:'40mg SC daily (eGFR ≥30)',f:'safe'},ckd4:{d:'20mg SC daily (eGFR 15–29); anti-Xa monitoring recommended',f:'adjust'},ckd5:{d:'AVOID — use UFH SC; unpredictable accumulation',f:'avoid'},hd:{d:'AVOID — use UFH 5000 units SC BD; LMWH accumulates in ESKD',f:'avoid'},pd:{d:'AVOID — use UFH 5000 units SC BD',f:'avoid'},note:'Renally eliminated. Accumulates in CKD4+ causing haemorrhagic risk. Use UFH in CKD5/HD/PD. Anti-Xa monitoring recommended in CKD4 (eGFR 15–29): target peak anti-Xa 0.2–0.4 IU/mL (prophylactic).',src:'eTG + UpToDate'},
      {drug:'UFH 5000 units SC (Prophylactic)',route:'SC',use:'VTE prophylaxis — preferred in CKD5, HD, and PD',std:'5000 units SC BD–TDS',ckd3:{d:'5000 units SC BD–TDS ✓',f:'safe'},ckd4:{d:'5000 units SC BD–TDS ✓ — preferred over LMWH in CKD4',f:'safe'},ckd5:{d:'5000 units SC BD–TDS ✓ — hepatic clearance; preferred in ESKD',f:'safe'},hd:{d:'5000 units SC BD–TDS ✓ — not HD-cleared; standard HD anticoagulation separate',f:'safe'},pd:{d:'5000 units SC BD–TDS ✓',f:'safe'},note:'Predominantly hepatically eliminated — predictable pharmacokinetics in CKD unlike LMWH. Preferred VTE prophylaxis in CKD5, HD, and PD. APTT monitoring not required at prophylactic doses.',src:'eTG + UpToDate'},
      {drug:'━━━ NOACs — ANTICOAGULATION ━━━',isHeader:true,route:'',use:'',std:'',ckd3:{d:'',f:'safe'},ckd4:{d:'',f:'safe'},ckd5:{d:'',f:'safe'},hd:{d:'',f:'safe'},pd:{d:'',f:'safe'},note:'',src:'eTG'},
      {drug:'Apixaban (Eliquis)',route:'PO',use:'Safest NOAC in CKD — AF or VTE; dose reduce if ≥2 criteria met',std:'AF: 5mg BD standard (2.5mg BD if ≥2 criteria); VTE: 10mg BD ×7d then 5mg BD',ckd3:{d:'AF: 5mg BD (reduce to 2.5mg BD if ≥2 criteria). VTE: standard. ✓',f:'safe'},ckd4:{d:'AF: 5mg BD or 2.5mg BD if criteria met; most evidence of any NOAC in CKD3–4',f:'adjust'},ckd5:{d:'Use with caution — insufficient data; consult haematology/cardiology; avoid if eGFR <15',f:'caution'},hd:{d:'Growing evidence for AF in HD (RENAL-AF trial); 2.5mg BD often used — consult specialist',f:'caution'},pd:{d:'Limited data — specialist guidance; 2.5mg BD if used',f:'caution'},note:'Dose reduction criteria: reduce to 2.5mg BD AF dose if ≥2 of: age ≥80 years, weight ≤60kg, serum Cr ≥133 µmol/L. ~27% renal clearance — most tolerated NOAC in CKD. Preferred NOAC over rivaroxaban/dabigatran in CKD.',src:'UpToDate'},
      {drug:'Rivaroxaban (Xarelto)',route:'PO',use:'NOAC — AF or VTE; dose reduce in CKD3; avoid eGFR <15',std:'AF: 20mg daily with evening meal (15mg daily if eGFR 15–49); VTE acute: 15mg BD ×3wk then 20mg daily',ckd3:{d:'AF: 15mg daily (eGFR 30–49); 20mg daily (eGFR 50+). VTE: standard then reduce.',f:'adjust'},ckd4:{d:'AF: 15mg daily; VTE: use with caution — anti-Xa monitoring if used; apixaban preferred',f:'adjust'},ckd5:{d:'eGFR <15: AVOID — insufficient data; use warfarin or apixaban',f:'avoid'},hd:{d:'CONTRAINDICATED — avoid; warfarin or apixaban (specialist guidance) preferred',f:'avoid'},pd:{d:'AVOID in CKD5/PD — use warfarin or apixaban (specialist)',f:'avoid'},note:'~33% renal clearance. Must be taken WITH food (bioavailability reduced fasting). AF dose: 15mg daily if CrCl 15–49 mL/min. CI in eGFR <15. Apixaban is preferred over rivaroxaban in CKD.',src:'UpToDate'},
      {drug:'Dabigatran (Pradaxa)',route:'PO',use:'NOAC — AF or VTE; 85% renally cleared — AVOID in CKD4+',std:'AF: 150mg BD standard; 110mg BD if high-risk bleeding or CrCl <50. VTE: 150mg BD after parenteral anticoag',ckd3:{d:'CrCl 30–50: 110mg BD (AF). VTE: 150mg BD (caution in CKD3b; monitor closely).',f:'adjust'},ckd4:{d:'CONTRAINDICATED in eGFR <30 — apixaban or warfarin instead',f:'avoid'},ckd5:{d:'CONTRAINDICATED',f:'avoid'},hd:{d:'CONTRAINDICATED — 85% renally cleared; major accumulation risk',f:'avoid'},pd:{d:'CONTRAINDICATED',f:'avoid'},note:'85% renally eliminated — most problematic NOAC in CKD. Avoid in CKD4/5. Very sensitive to renal function changes. Reversal agent: idarucizumab (Praxbind) — available in Australia.',src:'UpToDate'},
      {drug:'Warfarin',route:'PO',use:'Anticoagulation for AF/VTE/mechanical valves — no dose adjustment but increased monitoring in CKD',std:'Individualised — start 5mg daily; target INR 2–3 (AF/VTE) or 2.5–3.5 (mechanical mitral)',ckd3:{d:'Standard dosing; more INR variability — increase monitoring frequency',f:'safe'},ckd4:{d:'Standard dosing; INR variability ↑; weekly monitoring during any change',f:'adjust'},ckd5:{d:'Standard dosing; higher haemorrhagic complication rate in ESKD; risk-benefit discussion',f:'adjust'},hd:{d:'Standard INR targets; INR variability common; monitor 2-weekly when stable; ↑ bleeding risk vs benefit debate — apixaban emerging evidence for AF',f:'adjust'},pd:{d:'Standard dosing; INR monitoring; PD patients often stable if medication-consistent',f:'adjust'},note:'No pharmacokinetic dose adjustment. CKD causes ↑ INR variability (diet, uremia alters Vit K metabolism, drug interactions). Higher hemorrhagic risk in ESKD. For HD AF: emerging evidence for apixaban over warfarin (discuss with haematology/cardiology).',src:'eTG + UpToDate'},
      {drug:'━━━ DIABETES MEDICATIONS ━━━',isHeader:true,route:'',use:'',std:'',ckd3:{d:'',f:'safe'},ckd4:{d:'',f:'safe'},ckd5:{d:'',f:'safe'},hd:{d:'',f:'safe'},pd:{d:'',f:'safe'},note:'',src:'eTG'},
      {drug:'Metformin',route:'PO',use:'T2DM — CONTRAINDICATED in eGFR <30; always stop before contrast',std:'500mg–1g BD (standard)',ckd3:{d:'eGFR 45–59: max 1g BD. eGFR 30–44: reduce to 500mg BD; hold if acutely unwell or before contrast.',f:'adjust'},ckd4:{d:'CONTRAINDICATED (eGFR <30) — lactic acidosis risk',f:'avoid'},ckd5:{d:'CONTRAINDICATED',f:'avoid'},hd:{d:'CONTRAINDICATED',f:'avoid'},pd:{d:'CONTRAINDICATED',f:'avoid'},note:'Lactic acidosis risk with metformin accumulation in CKD — impaired renal excretion. Always cease 48h before contrast, procedures, or any acute illness causing AKI risk. Resume only when eGFR confirmed stable. Australian guidelines: OK in CKD3a (eGFR ≥45) at standard dose; reduce in CKD3b (eGFR 30–44); STOP if eGFR <30.',src:'eTG + UpToDate'},
      {drug:'Insulin (ward sliding scale / BD dosing)',route:'SC/IV',use:'Glucose management in CKD — requirements ↓ in CKD4/5 (reduced renal insulin degradation)',std:'Individualised per BSL; reduce sliding scale by 25–50% in CKD4/5',ckd3:{d:'Standard BSL monitoring; slight reduction in requirements may occur',f:'safe'},ckd4:{d:'Reduce sliding scale by ~25%; hypoglycaemia risk ↑; BGL q4–6h',f:'adjust'},ckd5:{d:'Reduce sliding scale by 25–50%; insulin half-life prolonged; BGL q4h; frequent hypos',f:'caution'},hd:{d:'Requirements often ↓↓ in ESKD; BGL q4–6h; post-HD glucose may fall (dialysate glucose 5.5 mmol/L)',f:'caution'},pd:{d:'PD dialysate contains dextrose — glucose load; requirements may ↑; peritoneal insulin delivery option for T1DM in PD',f:'adjust'},note:'Kidneys degrade 30–40% of circulating insulin. In CKD4/5: insulin half-life prolonged, requirements decrease → high hypoglycaemia risk. Reduce starting doses and monitor BGL frequently. Post-HD glucose often falls as dialysate glucose equilibrates.',src:'eTG + UpToDate'},
      {drug:'━━━ COMMON WARD MEDICATIONS ━━━',isHeader:true,route:'',use:'',std:'',ckd3:{d:'',f:'safe'},ckd4:{d:'',f:'safe'},ckd5:{d:'',f:'safe'},hd:{d:'',f:'safe'},pd:{d:'',f:'safe'},note:'',src:'eTG'},
      {drug:'Omeprazole / Pantoprazole (PPI)',route:'PO/IV',use:'Acid suppression — no dose adjustment at any CKD stage',std:'Omeprazole 20–40mg daily; pantoprazole 40mg daily',ckd3:{d:'Standard ✓',f:'safe'},ckd4:{d:'Standard ✓',f:'safe'},ckd5:{d:'Standard ✓ (hepatic)',f:'safe'},hd:{d:'Standard ✓ (not HD-cleared)',f:'safe'},pd:{d:'Standard ✓',f:'safe'},note:'Predominantly hepatic metabolism. No dose adjustment at any CKD/dialysis stage. ⚠ Long-term PPI use associated with PPI-induced hypomagnesaemia — inhibits intestinal TRPM6 magnesium transporter. Monitor Mg²⁺ in CKD patients on long-term PPIs.',src:'eTG'},
      {drug:'Allopurinol',route:'PO',use:'Gout prevention — active metabolite (oxypurinol) accumulates in CKD',std:'Standard: 300mg daily; CKD: dose based on eGFR',ckd3:{d:'eGFR 30–59: max 100–200mg daily; titrate slowly',f:'adjust'},ckd4:{d:'50–100mg daily maximum; oxypurinol accumulates',f:'adjust'},ckd5:{d:'50mg daily maximum; significant oxypurinol accumulation',f:'adjust'},hd:{d:'100mg post-HD 3×/week (HD-cleared); or 50–100mg daily with monitoring',f:'adjust'},pd:{d:'50–100mg daily; minimal PD clearance',f:'adjust'},note:'Oxypurinol (active metabolite) is renally eliminated — accumulates in CKD causing severe hypersensitivity reactions (allopurinol hypersensitivity syndrome, Stevens-Johnson syndrome) at standard doses. Always start low and titrate based on eGFR and uric acid response. HLA-B*5801 testing before starting (high-risk populations: Korean, Han Chinese, Thai).',src:'eTG + UpToDate'},
      {drug:'Colchicine',route:'PO',use:'Acute gout treatment and prevention — reduce dose in CKD4/5',std:'Acute: 1mg then 0.5mg 1h later (max); Prevention: 0.5mg daily',ckd3:{d:'Acute: 1mg then 0.5mg ✓; Prevention: 0.5mg daily; monitor',f:'safe'},ckd4:{d:'Acute: 0.5mg once only; Prevention: 0.5mg every 2–3 days; myopathy risk',f:'adjust'},ckd5:{d:'Acute: 0.5mg once; avoid repeat dosing; do not use for prevention in ESKD',f:'caution'},hd:{d:'Acute: 0.5mg once only; not removed by HD; toxicity risk; avoid maintenance',f:'avoid'},pd:{d:'Acute: 0.5mg once; caution — minimal PD clearance; avoid maintenance',f:'caution'},note:'Renally and hepatically eliminated. Accumulates in CKD causing colchicine toxicity (myopathy, neuropathy, cytopaenia, multi-organ failure). Many drug interactions (clarithromycin, cyclosporin — serious toxicity). Reduce dose significantly in CKD4+.',src:'eTG + UpToDate'},
      {drug:'Gabapentin',route:'PO',use:'Neuropathic pain, seizures, restless legs (RLS common in CKD) — significant dose reduction in CKD',std:'Neuropathic pain: 300mg TDS (standard); RLS in ESKD: 100–300mg post-HD',ckd3:{d:'eGFR 30–59: max 300mg BD–TDS; sedation monitoring',f:'adjust'},ckd4:{d:'100–300mg BD; significant dose reduction; sedation and myoclonus risk',f:'adjust'},ckd5:{d:'100–300mg daily; accumulation causes sedation, myoclonus, encephalopathy',f:'adjust'},hd:{d:'100–300mg post-HD 3×/week (HD-cleared); EXCELLENT for RLS in HD',f:'adjust'},pd:{d:'100mg daily; monitor for sedation; PD clearance minimal',f:'adjust'},note:'Renally eliminated — significant accumulation in CKD causing sedation, myoclonus, encephalopathy. Very effective for restless legs syndrome (RLS) in HD patients — give 100–300mg post-HD. AVOID pre-HD dosing (sedation during dialysis). Pregabalin has similar restrictions.',src:'eTG + UpToDate'},
      {drug:'Pregabalin',route:'PO',use:'Neuropathic pain, anxiety, RLS — significant dose reduction in CKD (renally cleared)',std:'Neuropathic pain: 75–150mg BD (standard)',ckd3:{d:'eGFR 30–59: max 75mg BD; titrate slowly',f:'adjust'},ckd4:{d:'25–75mg daily; significant accumulation risk',f:'adjust'},ckd5:{d:'25–50mg daily; significant accumulation — sedation, myoclonus',f:'adjust'},hd:{d:'25–50mg post-HD (HD-cleared); similar to gabapentin for RLS',f:'adjust'},pd:{d:'25–50mg daily with close monitoring',f:'adjust'},note:'Renally eliminated — similar restrictions to gabapentin. Significant accumulation in CKD causing sedation, myoclonus, encephalopathy. Effective for neuropathic pain and RLS in CKD. Dose post-HD like gabapentin.',src:'eTG + UpToDate'},
      {drug:'Bisphosphonates (zoledronic acid, alendronate)',route:'IV/PO',use:'Osteoporosis, hypercalcaemia — CONTRAINDICATED in eGFR <30–35',std:'Zoledronic acid 5mg IV annual; alendronate 70mg weekly PO',ckd3:{d:'eGFR ≥35: standard dosing. eGFR 30–35: caution; specialist guidance.',f:'adjust'},ckd4:{d:'CONTRAINDICATED (eGFR <30–35) — nephrotoxic, accumulation',f:'avoid'},ckd5:{d:'CONTRAINDICATED',f:'avoid'},hd:{d:'CONTRAINDICATED — dialysis does not adequately remove bisphosphonates',f:'avoid'},pd:{d:'CONTRAINDICATED',f:'avoid'},note:'Renally eliminated. Accumulation in CKD causes nephrotoxicity and atypical bone disease (adynamic bone). Contraindicated in eGFR <30–35. For osteoporosis in CKD5/HD: denosumab is an alternative (monitor for hypocalcaemia — common and can be severe).',src:'UpToDate'},
    ],
    monitoring:['Analgesia: BGL q4–6h if opioids used in CKD4/5 (opioid half-life prolonged); pain reassessment q4–6h','NOAC safety: renal function check at each prescription (eGFR) — dose adjust as CKD progresses; do not continue fixed dose if eGFR has declined','Metformin: eGFR before each prescription; never prescribe if eGFR <30 or if acute illness','Gabapentin/pregabalin: sedation assessment; myoclonus is an early sign of accumulation — reduce dose immediately if present','Allopurinol: uric acid level + skin/mucosal reactions (hypersensitivity); LFTs if rash develops','Colchicine: CK if weakness (myopathy); FBC (cytopaenia); monitor for drug interactions (clarithromycin, cyclosporin — serious)','Insulin: BGL q4h in CKD4/5; adjust sliding scale for reduced insulin requirements'],
    dialysis:['Gabapentin/pregabalin: POST-HD dose for RLS in dialysis — excellent efficacy; avoid pre-HD dosing (sedation risk)','Warfarin in HD: growing evidence that apixaban 2.5mg BD may be preferred over warfarin for AF in HD (discuss haematology/cardiology)','Metformin: NEVER in dialysis patients — lactic acidosis risk is absolute','VTE prophylaxis: UFH 5000 units SC BD preferred in all dialysis patients; do not use LMWH','PD insulin: glucose load from dextrose dialysate increases insulin requirements; intraperitoneal insulin delivery possible (T1DM in PD)','Colchicine in HD: use with extreme caution — single 0.5mg dose only for acute gout; not for maintenance'],

  {
    id:'transplant-fever',quizTag:'transplant',name:'Renal Transplant + Fever',abbr:'Transplant Fever',cat:'Acute Presentations',icon:'🔵',type:'investigations',
    summary:'Fever in a renal transplant recipient requires urgent structured evaluation. Timing post-transplant is critical: <1 month (surgical/nosocomial), 1–6 months (peak opportunistic infection risk), >6 months (community-acquired ± late opportunistic). ALWAYS check tacrolimus level with any fever or new antibiotic — multiple clinically significant drug interactions.',
    pearls:['CMV is the most important opportunistic pathogen 1–6 months post-transplant — check CMV viral load urgently','ALWAYS check tacrolimus trough level with any fever AND when starting/stopping antibiotics','⚠ Macrolides (azithromycin, clarithromycin): significantly ↑ tacrolimus levels (CYP3A4 inhibition) — check level 48h after starting','⚠ Azoles (fluconazole, voriconazole, posaconazole): markedly ↑ tacrolimus — reduce tacrolimus dose 50–70% when starting; daily levels','⚠ Rifampicin: dramatically ↓ tacrolimus levels — avoid if possible; if essential, daily level monitoring','BK virus nephropathy: no specific antiviral — reduce immunosuppression (transplant team only)','Do NOT adjust immunosuppression without transplant team guidance — risk of acute rejection','Fluoroquinolones: generally safe with tacrolimus (minor interaction; check level at 48h)'],
    investigations:[
      {cat:'First-Line — All Transplant Fevers',icon:'🚨',items:[
        {test:'Tacrolimus trough level',detail:'MANDATORY with any fever. Also essential when starting/stopping antibiotics (macrolides, azoles, rifampicin). Target trough typically 5–12 ng/mL (year 1); 4–8 ng/mL (year 2+) — centre-specific.',urgency:'Mandatory'},
        {test:'U&E + creatinine (vs baseline)',detail:'Rising Cr may indicate: rejection, CNI nephrotoxicity, dehydration, CMV nephritis, BK nephropathy. Establish trend vs documented baseline.',urgency:'Mandatory'},
        {test:'FBC + differential',detail:'Leucopenia → CMV/viral or immunosuppression toxicity; leucocytosis → bacterial infection; thrombocytopaenia → TTP, viral. Neutropenia → reduce MMF, consider G-CSF.',urgency:'Mandatory'},
        {test:'Blood cultures ×2',detail:'Both peripheral sites. Bacteraemia more common due to immunosuppression.',urgency:'Mandatory'},
        {test:'Urine MCS + protein/ACR',detail:'UTI common in transplant recipients. Protein/ACR as marker of graft function.',urgency:'Mandatory'},
        {test:'CMV viral load (plasma PCR)',detail:'Urgent if 1–6 months post-transplant or CMV D+/R- mismatch. CMV disease: viral load >1000 IU/mL + symptoms (fever, malaise, GI, hepatitis, pneumonitis).',urgency:'Urgent — same day'},
        {test:'CRP + LDH',detail:'LDH elevated in CMV disease, rejection, EBV-related disease.',urgency:'Mandatory'},
        {test:'Chest X-ray',detail:'PCP: diffuse bilateral perihilar infiltrates; CMV pneumonitis; bacterial pneumonia.',urgency:'Urgent — same day'},
      ]},
      {cat:'Timing-Based Workup',icon:'📅',items:[
        {test:'<1 Month Post-Transplant',detail:'Wound infection, UTI, urinary leak, line infection, donor-derived infection. Investigations: wound review, transplant ultrasound (collection, anastomotic leak), blood + urine cultures.',urgency:'First-line'},
        {test:'1–6 Months (Peak Opportunistic Period)',detail:'CMV viral load, BK viral load (plasma + urine decoy cells), induced sputum/BAL for PCP if respiratory, beta-D-glucan + galactomannan if pulmonary infiltrate.',urgency:'First-line'},
        {test:'>6 Months Post-Transplant',detail:'Community-acquired infections predominate. Also: late CMV, BK nephropathy (BK viral load), PTLD (LDH, EBV viral load, CT if lymphadenopathy). Check annual vaccination status.',urgency:'First-line'},
        {test:'BK Virus (plasma PCR + urine decoy cells)',detail:'BK nephropathy: plasma viral load >10,000 copies/mL or rising trend. Management = reduce immunosuppression (transplant team — no specific antiviral). Confirm with biopsy if Cr rising.',urgency:'First-line'},
        {test:'Renal Transplant Ultrasound (Doppler)',detail:'Graft hydronephrosis, perinephric collection, graft vascularity. Consider if Cr rising or localising signs.',urgency:'If clinically indicated'},
        {test:'Renal Transplant Biopsy',detail:'If: acute rejection suspected, rising Cr without clear infectious cause, BK nephropathy confirmation. Urgent transplant/nephrology referral.',urgency:'If clinically indicated'},
      ]},
      {cat:'Specific Infection Tests',icon:'🧫',items:[
        {test:'PCP — Induced Sputum or BAL',detail:'Pneumocystis jiroveci: diffuse bilateral perihilar infiltrates on CXR/CT; elevated beta-D-glucan; elevated LDH. Immunofluorescence and PCR on sputum/BAL. Treat: high-dose TMP-SMX IV (renally adjusted).',urgency:'If respiratory symptoms'},
        {test:'Fungal (galactomannan + beta-D-glucan)',detail:'Aspergillus: serum galactomannan; CT chest = halo sign (early) or cavitation. Beta-D-glucan elevated in most fungal infections. CT chest mandatory if positive.',urgency:'If pulmonary infiltrate'},
        {test:'Respiratory Virus PCR Panel',detail:'Influenza A/B, RSV, COVID-19, parainfluenza. Consider empirical oseltamivir in influenza season.',urgency:'If respiratory symptoms'},
        {test:'EBV viral load (plasma PCR)',detail:'PTLD — especially EBV D+/R- patients; elevated LDH; lymphadenopathy. Urgent haematology/transplant review.',urgency:'If clinically indicated'},
      ]},
    ],
    meds:[
      {drug:'Valganciclovir',route:'PO',use:'CMV treatment (higher dose) and CMV prophylaxis (lower dose)',std:'Treatment: 900mg BD; Prophylaxis: 900mg daily (3–6 months post-transplant)',ckd3:{d:'eGFR 40–59: 450mg BD (Tx); 450mg daily (Px)',f:'adjust'},ckd4:{d:'eGFR 25–39: 450mg daily (Tx); 450mg q2d (Px)',f:'adjust'},ckd5:{d:'eGFR 10–24: 450mg q2d (Tx); 450mg 2×/week (Px)',f:'adjust'},hd:{d:'eGFR <10/HD: 200mg 3×/week post-HD (Tx); 100mg post-HD 3×/week (Px). Severe CMV → IV ganciclovir.',f:'adjust'},pd:{d:'Dose per renal function (as eGFR <10); transplant team guidance',f:'adjust'},note:'Significant renal dose adjustment — consult pharmacy + transplant team. Monitor FBC weekly (myelosuppression). IV ganciclovir preferred for severe/systemic CMV disease.',src:'UpToDate'},
      {drug:'Tacrolimus (Prograf/Advagraf)',route:'PO',use:'Standard immunosuppression — check level with ANY fever or antibiotic change',std:'Target trough: 5–12 ng/mL (year 1); 4–8 ng/mL (year 2+) — centre-specific',ckd3:{d:'Check level urgently; dose adjust per level + transplant team',f:'adjust'},ckd4:{d:'Level check; nephrotoxic at supratherapeutic levels; transplant team',f:'adjust'},ckd5:{d:'Level monitoring critical; transplant team mandatory',f:'caution'},hd:{d:'Not significantly HD-cleared; level monitoring critical',f:'adjust'},pd:{d:'Not significantly removed by PD; level monitoring critical',f:'adjust'},note:'↑ tacrolimus: azithromycin (~50–100%), clarithromycin, fluconazole (markedly), voriconazole, diltiazem, grapefruit. ↓ tacrolimus: rifampicin (dramatically), carbamazepine, phenytoin. Check level when starting/stopping any interacting drug.',src:'UpToDate'},
      {drug:'Fluconazole',route:'PO/IV',use:'Candida infections — ⚠ MAJOR tacrolimus interaction',std:'Treatment: 400mg load then 200–400mg daily; Prophylaxis: 50–200mg daily',ckd3:{d:'Standard dose (hepatic)',f:'adjust'},ckd4:{d:'Reduce ~50% if eGFR <20; monitor tacrolimus',f:'adjust'},ckd5:{d:'200mg load then 100mg daily; daily tacrolimus levels',f:'adjust'},hd:{d:'Standard dose post-HD; supplement post-HD; daily tacrolimus levels',f:'adjust'},pd:{d:'Standard dose; daily tacrolimus levels when starting',f:'adjust'},note:'⚠ MAJOR TACROLIMUS INTERACTION: Reduce tacrolimus dose by 50–70% when starting fluconazole; daily tacrolimus levels until stable. Voriconazole/posaconazole have similar or greater interaction.',src:'UpToDate'},
      {drug:'TMP-SMX (PCP prophylaxis)',route:'PO',use:'PCP prophylaxis (low dose); treatment requires high-dose IV (see notes)',std:'Prophylaxis: 80/400mg (SS) daily or 160/800mg (DS) 3×/week',ckd3:{d:'SS daily with K+ + Cr monitoring',f:'adjust'},ckd4:{d:'Use with extreme caution; prefer atovaquone 1500mg daily',f:'caution'},ckd5:{d:'Avoid standard TMP-SMX; atovaquone 1500mg daily preferred for prophylaxis',f:'avoid'},hd:{d:'Prophylaxis: dapsone or atovaquone preferred. PCP treatment: extreme caution; strict K+ monitoring.',f:'avoid'},pd:{d:'Atovaquone preferred for prophylaxis in CKD4/5',f:'caution'},note:'Note: TMP-SMX is used post-transplant despite CKD (PCP is fatal without prophylaxis — benefit outweighs risk). Transplant team monitors carefully. Atovaquone 1500mg daily is preferred alternative in CKD4/5.',src:'UpToDate'},
    ],
    monitoring:['Tacrolimus level: urgently with any fever AND with any new antibiotic (especially macrolides, azoles)','U&E + Cr daily if unwell — current vs baseline trend essential','CMV viral load: weekly during risk period (1–6 months); urgently if symptomatic','BK viral load: monthly for first year; if rising → transplant team for immunosuppression reduction','FBC: leucopenia → CMV/viral/MMF toxicity','ALWAYS contact the transplant team for any fever in a transplant recipient — immunosuppression management is theirs to guide'],
    dialysis:['Functioning transplant patients are not on dialysis — this section applies to failing graft scenarios','Failing graft (returning to dialysis): tacrolimus typically ceased — discuss with transplant team','CMV prophylaxis dosing in any residual renal dysfunction: valganciclovir per renal function — pharmacy essential'],
  },
  {
    id:'acs-ckd',name:'ACS / MI in CKD',abbr:'ACS / MI',cat:'Acute Presentations',icon:'💔',type:'management',
    summary:'ACS management in CKD follows the same principles as the general population with critical drug adjustments. LMWH should be avoided in CKD4/5 and HD — use UFH (not renally cleared). Ticagrelor is preferred over prasugrel in advanced CKD. Contrast for PCI is acceptable; HD will remove it post-procedure. Troponin is chronically elevated at baseline in ESKD — trending matters more than absolute value.',
    pearls:['UFH (unfractionated heparin) preferred over LMWH in CKD4/5 and HD — UFH is hepatically cleared, not renally','Enoxaparin: avoid in eGFR <30; dose reduce to once-daily in eGFR 15–29; anti-Xa monitoring in CKD3b+','Fondaparinux: contraindicated if eGFR <20 — use UFH instead','Ticagrelor: preferred over prasugrel in CKD — hepatic metabolism, no dose adjustment; avoid prasugrel in eGFR <15/HD','Aspirin: no dose adjustment needed across all CKD/dialysis stages','PCI + contrast: proceed if indicated; HD will remove contrast post-procedure; pre-hydrate if any residual function','AVOID atenolol post-MI — renally eliminated; use carvedilol, bisoprolol, or metoprolol succinate','Troponin in ESKD: chronically elevated — always trend (serial measurements) rather than relying on absolute values'],
    meds:[
      {drug:'Aspirin',route:'PO',use:'Antiplatelet — all ACS (loading + maintenance)',std:'300mg loading; then 100mg daily',ckd3:{d:'300mg load → 100mg daily ✓',f:'safe'},ckd4:{d:'300mg load → 100mg daily ✓',f:'safe'},ckd5:{d:'300mg load → 100mg daily ✓',f:'safe'},hd:{d:'300mg load → 100mg daily ✓ (not HD-cleared)',f:'safe'},pd:{d:'300mg load → 100mg daily ✓',f:'safe'},note:'No dose adjustment across all CKD/dialysis stages. ESKD patients have platelet dysfunction and ↑ bleeding risk — benefit vs risk should be considered case by case.',src:'eTG + UpToDate'},
      {drug:'Ticagrelor',route:'PO',use:'P2Y12 antiplatelet — preferred in CKD (over prasugrel)',std:'180mg loading; then 90mg BD × 12 months',ckd3:{d:'180mg → 90mg BD ✓ (no renal adjustment)',f:'safe'},ckd4:{d:'180mg → 90mg BD ✓ — preferred over prasugrel',f:'safe'},ckd5:{d:'180mg → 90mg BD ✓ — strongly preferred over prasugrel',f:'safe'},hd:{d:'180mg → 90mg BD ✓ (not HD-cleared; preferred agent in HD)',f:'safe'},pd:{d:'180mg → 90mg BD ✓',f:'safe'},note:'Hepatic metabolism — no dose adjustment. Dyspnoea side effect common. Avoid if: prior intracranial haemorrhage, severe hepatic impairment.',src:'eTG + UpToDate'},
      {drug:'UFH — Unfractionated Heparin',route:'IV',use:'Anticoagulation in ACS — PREFERRED in CKD4/5 and HD',std:'60 units/kg IV loading (max 4000 units); infusion 12 units/kg/h; titrate APTT to 60–100 sec',ckd3:{d:'Standard UFH; APTT-guided',f:'safe'},ckd4:{d:'UFH preferred over LMWH; APTT-guided',f:'safe'},ckd5:{d:'UFH strongly preferred — not renally cleared; APTT-guided',f:'safe'},hd:{d:'UFH preferred; APTT-guided; safe in HD',f:'safe'},pd:{d:'UFH preferred in CKD5/PD; APTT-guided',f:'safe'},note:'Hepatically eliminated — not renally cleared. APTT monitoring essential. Preferred over LMWH in CKD4/5 and dialysis.',src:'eTG + UpToDate'},
      {drug:'Enoxaparin (LMWH)',route:'SC',use:'Anticoagulation in ACS — with CKD restrictions',std:'1mg/kg BD SC (therapeutic); 40mg daily SC (prophylactic)',ckd3:{d:'Standard 1mg/kg BD; anti-Xa monitoring in CKD3b (eGFR 30–44)',f:'adjust'},ckd4:{d:'1mg/kg once daily only; anti-Xa monitoring mandatory',f:'adjust'},ckd5:{d:'AVOID — unpredictable accumulation, haemorrhagic risk; use UFH',f:'avoid'},hd:{d:'AVOID — accumulation in ESKD; use UFH',f:'avoid'},pd:{d:'AVOID — use UFH in CKD5/PD',f:'avoid'},note:'Renally eliminated — accumulates in CKD4/5. Anti-Xa monitoring in CKD3b+ (peak target 0.6–1.0 IU/mL BD dosing). Use UFH in CKD4/5/dialysis.',src:'eTG + UpToDate'},
      {drug:'Atorvastatin / Rosuvastatin',route:'PO',use:'High-intensity statin — all ACS regardless of baseline LDL',std:'Atorvastatin 40–80mg daily; Rosuvastatin 20–40mg daily',ckd3:{d:'Atorvastatin full dose ✓; rosuvastatin 20–40mg (preferred atorvastatin)',f:'safe'},ckd4:{d:'Atorvastatin full dose ✓; rosuvastatin reduce to max 10mg daily',f:'adjust'},ckd5:{d:'Atorvastatin full dose ✓; rosuvastatin max 10mg daily',f:'adjust'},hd:{d:'Atorvastatin full dose ✓; rosuvastatin max 10mg',f:'adjust'},pd:{d:'Atorvastatin full dose ✓; rosuvastatin max 10mg',f:'adjust'},note:'Atorvastatin: predominantly hepatic — no renal dose adjustment. Rosuvastatin: ~28% renal elimination — dose reduce in CKD4/5. Atorvastatin is the preferred statin in CKD.',src:'eTG + UpToDate'},
      {drug:'Carvedilol / Bisoprolol (Beta-blocker)',route:'PO',use:'Beta-blocker — post-MI LV protection; HFrEF; rate control (AVOID ATENOLOL)',std:'Carvedilol 3.125–25mg BD; Bisoprolol 2.5–10mg daily',ckd3:{d:'No adjustment ✓ (hepatic)',f:'safe'},ckd4:{d:'No adjustment ✓',f:'safe'},ckd5:{d:'No adjustment ✓ — carvedilol preferred',f:'safe'},hd:{d:'No adjustment; give PRE-HD (post-HD may exacerbate hypotension)',f:'safe'},pd:{d:'No adjustment ✓',f:'safe'},note:'⚠ AVOID ATENOLOL — renally eliminated, accumulates in CKD. Carvedilol has most evidence for post-MI LV protection in CKD. Start low, titrate up.',src:'eTG + UpToDate'},
    ],
    monitoring:['Serial ECGs and troponin (6–12h); trend matters more than absolute value in CKD (baseline troponin elevated)','U&E BD — ACS + contrast/anticoagulation → AKI on CKD risk','APTT q4–6h if UFH infusion; adjust per nomogram','Renal function at 24–48h post-contrast (contrast-induced nephropathy)','Potassium: K+ rises post-MI (catecholamine surge); monitor q4–6h acutely','Echocardiography: LV function, wall motion, mechanical complications'],
    dialysis:['HD patients: higher baseline cardiovascular risk; ACS is the leading cause of mortality in ESKD','Vascular access: DO NOT use fistula arm for IV medications — peripheral IV or central access only','PCI + contrast: proceed if indicated clinically; HD removes contrast post-procedure','Timing of HD: avoid during acute ACS if possible; if urgent for hyperkalaemia/fluid overload → gentle HD with continuous cardiac monitoring','Troponin in ESKD: chronically elevated at baseline — troponin TREND (serial measurements) is essential for diagnosis'],
  },

  {
    id:'hyperphosphataemia',quizTag:'ckd',name:'Hyperphosphataemia — Management',abbr:'Hyperphosphataemia',cat:'CKD Management',icon:'⚗️',type:'management',
    summary:'Hyperphosphataemia is near-universal in CKD4/5 and dialysis, driving secondary hyperparathyroidism, vascular calcification, and CKD-MBD. Management: dietary restriction (<800mg phosphate/day) + phosphate binders taken WITH meals + active vitamin D only once phosphate is controlled. KDIGO target: 0.8–1.5 mmol/L.',
    pearls:['Phosphate binders MUST be taken with meals — not at other times; timing is the most common adherence error','Calcium-based binders: risk of hypercalcaemia and vascular calcification in CKD5 — prefer non-calcium binders in dialysis patients','Sevelamer (Renvela): non-calcium binder, also reduces LDL cholesterol (~20%); PBS-listed for CKD4/5 and dialysis','Lanthanum carbonate (Fosrenol): must be CHEWED not swallowed whole; very effective; PBS-listed','HD removes ~800–1000mg phosphate per session — dietary restriction + binders still essential between sessions','Active vitamin D (calcitriol, alfacalcidol): risk of worsening hyperphosphataemia — only initiate if phosphate is controlled','FGF-23 rises early in CKD (before phosphate becomes elevated) — key early biomarker of CKD-MBD','Common high-phosphate foods: processed meats, dairy, nuts, cola drinks, fast food (phosphate additives)'],
    meds:[
      {drug:'Calcium Carbonate',route:'PO',use:'Phosphate binder (calcium-based) — taken WITH MEALS',std:'500mg–1.5g with each meal; titrate',ckd3:{d:'Generally well-tolerated; monitor Ca²⁺',f:'safe'},ckd4:{d:'Use with caution; monitor Ca²⁺',f:'adjust'},ckd5:{d:'Avoid high doses — calcium overload + vascular calcification risk; prefer non-calcium binders',f:'caution'},hd:{d:'Limit calcium binders — total calcium load high in dialysis; prefer sevelamer or lanthanum',f:'caution'},pd:{d:'Use with caution; calcium overload risk; prefer non-calcium binders',f:'caution'},note:'Cheap and widely available. Risk of hypercalcaemia and vascular calcification in CKD5/dialysis at high doses. Prefer non-calcium binders in dialysis patients (KDIGO recommendation).',src:'KDIGO'},
      {drug:'Sevelamer Carbonate (Renvela)',route:'PO',use:'Non-calcium phosphate binder — preferred in CKD5/dialysis',std:'800–2400mg TDS with meals; titrate to phosphate target',ckd3:{d:'Can use; less commonly needed in CKD3',f:'safe'},ckd4:{d:'800mg TDS with meals; PBS-listed from CKD4',f:'safe'},ckd5:{d:'800–2400mg TDS with meals; PBS-listed; preferred over calcium binders',f:'safe'},hd:{d:'800–2400mg TDS with meals; PBS-listed for HD; preferred agent',f:'safe'},pd:{d:'800–2400mg TDS with meals; PBS-listed; preferred agent',f:'safe'},note:'Non-calcium, non-metallic binder. PBS-listed for CKD4/5 and dialysis. Also reduces LDL cholesterol (~20%). Must be taken WITH food. May cause constipation/nausea. Sevelamer hydrochloride (Renagel) also available.',src:'KDIGO / PBS'},
      {drug:'Lanthanum Carbonate (Fosrenol)',route:'PO',use:'Non-calcium phosphate binder; highly effective; low pill burden',std:'250–500mg per tablet; 750–3000mg/day in 3 divided doses with meals',ckd3:{d:'Can use; less commonly needed in CKD3',f:'safe'},ckd4:{d:'250–500mg with each meal; PBS-listed',f:'safe'},ckd5:{d:'250–500mg with each meal; PBS-listed; effective alternative to sevelamer',f:'safe'},hd:{d:'250–500mg with each meal; PBS-listed for HD; very effective',f:'safe'},pd:{d:'250–500mg with each meal; PBS-listed',f:'safe'},note:'Must be CHEWED thoroughly before swallowing — not swallowed whole. Minimal systemic absorption. PBS-listed. Very effective. Tablet palatability can be an issue for some patients.',src:'KDIGO / PBS'},
      {drug:'Sucroferric Oxyhydroxide (Velphoro)',route:'PO',use:'Iron-based phosphate binder; lower pill burden than sevelamer',std:'1000mg (2 chewable tabs) TDS with meals; titrate; max 3000mg/day',ckd3:{d:'Less commonly needed in CKD3',f:'safe'},ckd4:{d:'1000mg TDS with meals; PBS-listed',f:'safe'},ckd5:{d:'1000mg TDS with meals; PBS-listed; lower pill burden vs sevelamer',f:'safe'},hd:{d:'1000mg TDS with meals; PBS-listed for HD',f:'safe'},pd:{d:'1000mg TDS with meals; PBS-listed',f:'safe'},note:'Iron-based (ferric) — minimal systemic iron absorption (unlike ferrous iron supplements). Must be chewed. Stool discolouration (dark) is common and benign. Lower pill burden than sevelamer.',src:'KDIGO / PBS'},
      {drug:'Calcitriol / Alfacalcidol (Active Vitamin D)',route:'PO/IV',use:'Secondary hyperparathyroidism — only initiate if phosphate is CONTROLLED first',std:'Calcitriol 0.25–0.5 mcg daily; alfacalcidol 0.25–1 mcg daily',ckd3:{d:'If PTH elevated and phosphate controlled; calcitriol 0.25mcg daily; monitor Ca²⁺ + PO₄',f:'adjust'},ckd4:{d:'Phosphate must be controlled first; calcitriol 0.25mcg daily; monitor Ca²⁺ + PO₄',f:'adjust'},ckd5:{d:'Phosphate must be controlled — active VitD worsens hyperphosphataemia if uncontrolled',f:'adjust'},hd:{d:'IV calcitriol post-HD or oral alfacalcidol; monitor Ca²⁺ + PO₄; paricalcitol alternative',f:'adjust'},pd:{d:'Oral calcitriol or alfacalcidol; monitor Ca²⁺ + PO₄',f:'adjust'},note:'Do NOT initiate if phosphate >1.5 mmol/L — will worsen hyperphosphataemia. Paricalcitol (selective VDR activator) may have less effect on Ca/P than calcitriol. Monitor Ca²⁺ and PO₄ regularly to avoid hypercalcaemia.',src:'KDIGO'},
    ],
    monitoring:['Phosphate: monthly in CKD4/5 and dialysis; target 0.8–1.5 mmol/L','Calcium (corrected for albumin): monthly — avoid hypercalcaemia (vascular calcification risk)','PTH: 3–6 monthly in CKD4/5; KDIGO target 2–9× upper limit of normal in dialysis','25-OH Vitamin D: at baseline; correct deficiency before starting active VitD therapy','Alkaline phosphatase: marker of bone turnover; elevated with high PTH/osteomalacia','FGF-23: rising early in CKD before phosphate elevates — useful prognostic marker','Dietary review: dietitian referral; identify high-phosphate foods; phosphate additives in processed foods'],
    dialysis:['HD removes ~800–1000mg phosphate per 4h session; dietary restriction + binders still essential between sessions (HD alone is insufficient)','Three sessions/week HD cannot control phosphate without dietary + pharmacological management','PD removes ~500–600mg phosphate/day continuously — lower phosphate burden than HD but binders still usually required','High-flux membranes and prolonged/frequent HD modalities improve phosphate clearance','PBS criteria for phosphate binders: CKD4/5 with documented hyperphosphataemia — discuss with nephrologist for appropriate listing'],
  },
  {
    id:'anaemia-ckd',quizTag:'ckd',name:'Anaemia of CKD',abbr:'Anaemia of CKD',cat:'CKD Management',icon:'🩸',type:'management',
    summary:'Anaemia of CKD is primarily due to relative EPO deficiency and functional/absolute iron deficiency. Target Hb 100–115 g/L (KDIGO 2012) — avoid targeting >130 g/L (↑ cardiovascular events). IV iron is preferred over oral in HD patients. ESA therapy requires concomitant iron repletion for efficacy — do not start ESA if iron-deficient.',
    pearls:['Target Hb: 100–115 g/L (KDIGO); avoid >130 g/L — demonstrated ↑ cardiovascular event risk','Iron deficiency is the most common correctable cause — always check TSAT and ferritin before starting ESA','IV iron preferred over oral in CKD4/5 and HD: better absorption, less GI side effects, IV access available','Do NOT start ESA if iron-deficient (TSAT <20% or ferritin <100 µg/L) — ESA will be ineffective without adequate iron','ESA hyporesponsiveness: think iron deficiency, infection/inflammation, folate/B12 deficiency, hyperparathyroidism, anti-EPO antibodies','Ferric carboxymaltose (Ferinject) 500–1000mg IV: most commonly used IV iron in Australia; single infusion, PBS-listed','HIF-PHI (roxadustat): oral agent; TGA approved for dialysis patients; PBS listing evolving in Australia','ESA can worsen hypertension in 20–30% — monitor BP with each dose titration'],
    meds:[
      {drug:'Ferric Carboxymaltose (Ferinject)',route:'IV',use:'IV iron repletion — first-line in CKD4/5 and dialysis',std:'500–1000mg IV infusion over 15–60 min; repeat based on iron studies',ckd3:{d:'500–1000mg IV; one infusion often sufficient',f:'safe'},ckd4:{d:'500–1000mg IV; PBS-listed for CKD',f:'safe'},ckd5:{d:'500–1000mg IV; PBS-listed; very effective',f:'safe'},hd:{d:'500–1000mg IV via HD circuit at end of session; PBS-listed for HD',f:'safe'},pd:{d:'500–1000mg IV infusion; PBS-listed',f:'safe'},note:'PBS-listed for CKD with documented iron deficiency. Can give via HD circuit at end of dialysis session. Hypersensitivity reactions rare (<0.1%) — monitor 30 min post-infusion. Transient hypophosphataemia may occur post-dose.',src:'KDIGO / PBS'},
      {drug:'Iron Sucrose (Venofer)',route:'IV',use:'IV iron repletion — alternative; convenient for HD via circuit',std:'200mg IV per HD session; or 200mg slow IV infusion',ckd3:{d:'200mg IV infusion; repeat as needed',f:'safe'},ckd4:{d:'200mg IV; repeat based on iron studies',f:'safe'},ckd5:{d:'200mg IV per dose; PBS-listed',f:'safe'},hd:{d:'200mg IV at end of each HD session (via HD circuit); PBS-listed',f:'safe'},pd:{d:'200mg IV infusion; PBS-listed',f:'safe'},note:'Slower repletion than ferric carboxymaltose (multiple doses needed). Very convenient for HD patients — given via HD circuit. Lower hypersensitivity risk than iron dextran.',src:'KDIGO / PBS'},
      {drug:'Oral Iron (ferrous sulfate)',route:'PO',use:'Iron repletion in CKD3 (non-dialysis) — not preferred in CKD4/5',std:'Ferrous sulfate 325mg (105mg elemental iron) BD–TDS',ckd3:{d:'325mg BD–TDS; reasonable in CKD3 if IV access difficult',f:'safe'},ckd4:{d:'Poor GI absorption in CKD; GI side effects; IV iron preferred',f:'adjust'},ckd5:{d:'Oral iron poorly absorbed in uraemia; IV iron strongly preferred',f:'caution'},hd:{d:'NOT recommended in HD — poor absorption, GI side effects; use IV iron',f:'avoid'},pd:{d:'Less effective in CKD5; IV iron preferred if iron-deficient',f:'caution'},note:'GI absorption impaired in CKD (elevated hepcidin). Oral iron interferes with phosphate binder absorption — space by 2h. IV iron strongly preferred in CKD4/5/dialysis.',src:'KDIGO'},
      {drug:'Darbepoetin Alfa (Aranesp)',route:'SC/IV',use:'ESA therapy — once iron-replete (TSAT ≥20%, ferritin ≥100)',std:'6.25–100 mcg SC weekly or fortnightly; titrate to Hb 100–115 g/L',ckd3:{d:'SC; start 6.25mcg weekly; titrate; PBS-listed if Hb <100 and iron-replete',f:'safe'},ckd4:{d:'SC preferred; 6.25–25mcg weekly; PBS-listed',f:'safe'},ckd5:{d:'SC or IV; 6.25–50mcg weekly; PBS-listed',f:'safe'},hd:{d:'IV via HD circuit or SC; weekly or fortnightly; PBS-listed for HD',f:'safe'},pd:{d:'SC injection; 6.25–50mcg weekly; PBS-listed',f:'safe'},note:'PBS-listed for CKD (Hb <100 g/L, iron-replete). Do NOT start if TSAT <20% or ferritin <100 — ESA ineffective without iron. Reduce dose 25–50% if Hb approaches 115 g/L. Monitor BP.',src:'KDIGO / PBS'},
      {drug:'Roxadustat (Evrenzo)',route:'PO',use:'HIF-PHI — oral ESA alternative; TGA approved for dialysis',std:'70mg 3×/week (non-dialysis CKD); 100mg 3×/week (dialysis)',ckd3:{d:'70mg 3×/week; titrate to Hb 100–120 g/L; PBS listing evolving',f:'adjust'},ckd4:{d:'70mg 3×/week; monitor Hb and BP',f:'adjust'},ckd5:{d:'100mg 3×/week; TGA approved',f:'safe'},hd:{d:'100mg 3×/week on dialysis days (give post-HD); TGA approved; PBS evolving',f:'safe'},pd:{d:'70–100mg 3×/week; TGA approved',f:'safe'},note:'HIF prolyl hydroxylase inhibitor — stimulates endogenous EPO production. Oral administration advantage. Multiple drug interactions: space by 1h from phosphate binders. TGA approved; PBS listing still evolving in Australia.',src:'UpToDate'},
    ],
    monitoring:['Hb: monthly during ESA initiation/titration; 3-monthly once stable; target 100–115 g/L','Iron studies (TSAT + ferritin): before starting ESA; monthly during ESA; 3-monthly once stable','Reticulocyte count: useful to assess ESA response (should ↑ within 2–4 weeks of starting ESA)','Blood pressure: monitor — ESA can worsen hypertension in 20–30% of patients','ESA hyporesponsive (no Hb ↑ after 4 weeks): check iron, CRP/infection, PTH, B12/folate, medication adherence','Potassium: iron infusions can occasionally cause transient hypokalaemia'],
    dialysis:['HD patients: give darbepoetin IV via HD circuit at end of session — no additional injection needed','IV iron via HD circuit at end of session — ideal for compliance','ESA dose typically higher in HD patients (chronic inflammation, losses via HD circuit, blood sampling)','Hb often more stable in PD than HD (continuous vs intermittent dialysis)','Transferrin losses via peritoneum in PD may worsen iron deficiency','PBS criteria: Hb <100 g/L + iron-replete (TSAT ≥20%, ferritin ≥100) before ESA initiation'],
  },
  {
    id:'metabolic-acidosis',name:'Metabolic Acidosis in CKD',abbr:'Metabolic Acidosis',cat:'CKD Management',icon:'⚖️',type:'management',
    summary:'Metabolic acidosis is common in CKD4/5 due to reduced ammoniagenesis and impaired acid excretion. KDIGO recommends maintaining serum bicarbonate ≥22 mmol/L. Correction slows CKD progression, preserves muscle mass, improves bone health, and reduces hyperkalaemia. Sodium bicarbonate supplementation is the primary pharmacological treatment.',
    pearls:['Target: serum bicarbonate ≥22 mmol/L (KDIGO 2012); Australian practice often targets 22–26 mmol/L','Sodium bicarbonate tablets: 500mg = ~6 mmol HCO₃; 840mg = ~10 mmol HCO₃; start low and titrate','Dietary acid load reduction (less red meat, more fruits and vegetables) can raise serum HCO₃ by 1–3 mmol/L','SGLT2 inhibitors have a modest alkalinising effect in CKD — secondary benefit','Correct metabolic acidosis before interpreting PTH/bone disease — acidosis worsens bone resorption and suppresses 1-alpha hydroxylase','Sodium load: each 500mg NaHCO₃ tablet delivers ~6mmol Na — relevant in hypertension, fluid overload, HD patients','VBG vs serum total CO₂: use VBG for pH, pCO₂, anion gap, compensation; use serum total CO₂ for monitoring trend','Winters formula for expected pCO₂: (1.5 × HCO₃) + 8 ± 2 — use to confirm appropriate respiratory compensation'],
    meds:[
      {drug:'Sodium Bicarbonate Tablets',route:'PO',use:'First-line alkalinisation in CKD metabolic acidosis',std:'500mg TDS (start); titrate to HCO₃ ≥22 mmol/L; typical dose 500mg–1g TDS',ckd3:{d:'500mg BD–TDS; titrate; monitor BP (sodium load ~6mmol/tab)',f:'safe'},ckd4:{d:'500mg TDS; titrate; monitor BP and fluid status',f:'safe'},ckd5:{d:'500mg–1g TDS; dialysis partially corrects acidosis; oral may still be needed',f:'safe'},hd:{d:'Dialysis bicarbonate bath corrects acidosis during session; oral may be needed between sessions; check pre-HD level',f:'adjust'},pd:{d:'PD dialysate corrects acidosis continuously; oral supplementation sometimes still needed; monitor HCO₃',f:'adjust'},note:'Sodium load: 500mg tab = ~6mmol Na. Use with caution in hypertension, HF, or fluid overload. Check pre-dialysis (not post-dialysis) HCO₃ for true picture.',src:'KDIGO'},
      {drug:'Sodium Citrate / Citric Acid (Shohl\'s Solution)',route:'PO',use:'Oral alkalinisation — liquid alternative if tablets not tolerated',std:'15–30mL TDS (1 mEq HCO₃ equivalent per mL); titrate to HCO₃ ≥22',ckd3:{d:'15–30mL TDS; well-tolerated oral liquid',f:'safe'},ckd4:{d:'15–30mL TDS; titrate to serum HCO₃',f:'safe'},ckd5:{d:'15–30mL TDS; citrate ↑ aluminium absorption — avoid concurrent aluminium antacids',f:'adjust'},hd:{d:'Citrate ↑ aluminium absorption — avoid concurrent aluminium-based antacids/binders; dialysis corrects most acidosis',f:'adjust'},pd:{d:'15–30mL TDS; monitor HCO₃',f:'safe'},note:'Citrate metabolised to bicarbonate in liver. Useful if tablets poorly tolerated. ⚠ Citrate significantly enhances intestinal aluminium absorption — avoid concurrent aluminium-containing antacids (e.g. aluminium hydroxide). May need compounding pharmacy.',src:'UpToDate'},
      {drug:'SGLT2 Inhibitors (Dapagliflozin/Empagliflozin)',route:'PO',use:'Alkalinising secondary benefit — primary indications: CKD + cardiac/renoprotection',std:'10mg daily',ckd3:{d:'10mg daily ✓ — cardiac + renoprotection; modest alkalinising effect',f:'safe'},ckd4:{d:'10mg daily ✓; benefit maintained to eGFR ~20',f:'safe'},ckd5:{d:'Generally NOT recommended (eGFR <20)',f:'caution'},hd:{d:'Generally NOT recommended in HD',f:'avoid'},pd:{d:'Generally NOT recommended in PD',f:'avoid'},note:'SGLT2 inhibitors reduce metabolic acidosis via glycosuria (less urinary acid load). Metabolic acidosis improvement is a secondary benefit — primary indication is CKD + cardiac protection (DAPA-CKD, EMPA-KIDNEY, DAPA-HF). Not used primarily for acid-base management.',src:'UpToDate / PBS'},
      {drug:'Dietary Acid Load Reduction',route:'Dietary',use:'Adjunct to pharmacological alkalinisation',std:'Reduce dietary acid load; increase alkali-generating foods',ckd3:{d:'Dietary counselling: ↓ red meat + processed foods; ↑ fruits and vegetables',f:'safe'},ckd4:{d:'Effective adjunct; dietitian essential; balance with K+ and PO₄ restrictions',f:'adjust'},ckd5:{d:'Important adjunct; must balance with phosphate and potassium restrictions — dietitian essential',f:'adjust'},hd:{d:'High-fruit diet may ↑ K+ in HD patients — balance carefully; focus on processed food reduction',f:'adjust'},pd:{d:'Lower K+ restriction than HD — more dietary flexibility; fruits/vegetables generally acceptable',f:'safe'},note:'High acid-generating foods: red meat, processed meats, cheese, grains. Low-acid/alkaline: most fruits and vegetables. Diet alone can raise serum HCO₃ by 1–3 mmol/L. Must be balanced with K+ and PO₄ restrictions in CKD — dietitian referral essential.',src:'KDIGO'},
    ],
    monitoring:['Serum bicarbonate (total CO₂): baseline; monthly during supplementation titration; 3-monthly once stable at ≥22 mmol/L','VBG if acute decompensation — for pH, pCO₂, anion gap, respiratory compensation (Winters formula)','Potassium: correcting acidosis shifts K+ into cells — may lower K+ (generally beneficial but monitor)','Blood pressure + fluid status: sodium bicarbonate adds sodium load — monitor BP and oedema especially in CKD4/5','Serum albumin: hypoalbuminaemia lowers measured bicarbonate (less buffer); corrected anion gap = AG + (40-albumin) × 0.25','PTH and bone markers: correct acidosis before interpreting PTH — acidosis suppresses 1-alpha hydroxylase and worsens bone resorption','Re-check HCO₃ at 4–6 weeks after dose escalation'],
    dialysis:['HD: bicarbonate dialysate corrects acidosis during session (dialysate HCO₃ typically 30–35 mmol/L); oral supplementation may still be needed between sessions','Pre-HD bicarbonate often low; normalises post-HD — check levels PRE-dialysis for true clinical picture','PD: lactate or bicarbonate-buffered dialysate corrects acidosis continuously; oral supplementation usually not needed but check HCO₃','Sodium bicarbonate in HD: additional sodium load — use with care in oliguric/anuric patients with fluid overload','Aggressive correction (HCO₃ >26): risk of rebound alkalosis post-HD — target 22–24 pre-dialysis'],
  },


  {
    id:'abg-ref',quizTag:'neph',name:'ABG',abbr:'ABG',cat:'Quick Study',icon:'🩺',type:'study',
    summary:'A systematic five-step approach to arterial blood gas interpretation. Always apply all five steps in order — do not skip ahead. Key principle: identify the primary disorder first, then check for appropriate compensation, then look for mixed disorders.',
    pearls:[
      'Step 1 — pH: acidaemia (<7.35) or alkalaemia (>7.45)?',
      'Step 2 — Primary disorder: is the CO₂ or HCO₃ driving the pH change? Acidaemia + ↑CO₂ = respiratory acidosis. Acidaemia + ↓HCO₃ = metabolic acidosis.',
      'Step 3 — Compensation: is it appropriate? If not → mixed disorder',
      'Step 4 — Anion Gap: AG = Na⁺ − (Cl⁻ + HCO₃⁻); normal 8–12 mEq/L (albumin-corrected). Corrected AG = measured AG + 2.5 × (40 − albumin in g/L)',
      'Step 5 — Delta-Delta (if HAGMA): is there a concurrent metabolic alkalosis or normal AG metabolic acidosis? Δ-Δ = (AG − 12) / (24 − HCO₃). <0.4: pure NAGMA. 0.4–2: pure HAGMA. >2: concurrent metabolic alkalosis.',
      'Winters Formula (metabolic acidosis compensation): expected pCO₂ = (1.5 × HCO₃) + 8 ± 2',
      'Metabolic alkalosis compensation: expected pCO₂ = (0.7 × HCO₃) + 21 ± 2',
      'Respiratory acidosis: acute compensation ↑HCO₃ by 1 per 10mmHg ↑pCO₂; chronic: ↑HCO₃ by 3.5 per 10mmHg',
      'Respiratory alkalosis: acute compensation ↓HCO₃ by 2 per 10mmHg ↓pCO₂; chronic: ↓HCO₃ by 5 per 10mmHg',
      'MUDPILES (HAGMA causes): Methanol, Uraemia, DKA, Propylene glycol / Paracetamol, Isoniazid / Iron, Lactic acidosis, Ethylene glycol, Salicylates',
      'USED CARP (metabolic alkalosis causes): Urine Chloride low (<20) = saline-responsive: vomiting, NGT, diuretics. Urine Chloride high (>40) = saline-resistant: hyperaldosteronism, Cushing, Bartter/Gitelman',
    ],

  {
    id:'ckd-staging',quizTag:'ckd',name:'CKD Staging & Assessment',abbr:'CKD Staging',cat:'Quick Study',icon:'📊',type:'study',
    summary:'CKD is defined as structural or functional kidney abnormality for >3 months. Staging uses the combined GFR-albuminuria grid (KDIGO 2012). CKD-EPI 2021 (race-free equation) is now the preferred eGFR equation in Australia — use this over MDRD. Risk of progression, cardiovascular disease, and ESKD increases with lower eGFR AND higher albuminuria.',

      'CKD diagnosis: abnormal kidney structure/function >3 months — either eGFR <60 (G3+) OR albuminuria (ACR ≥3 mg/mmol) OR structural abnormality',
      'CKD-EPI 2021 (race-free) is now preferred over MDRD — underestimates GFR less at higher values',
      'GFR categories: G1 ≥90 | G2 60–89 | G3a 45–59 | G3b 30–44 | G4 15–29 | G5 <15',
      'Albuminuria categories: A1 <3 mg/mmol (normal) | A2 3–30 mg/mmol (moderate) | A3 >30 mg/mmol (severe)',
      'Cystatin C-based eGFR: more accurate than creatinine-based in extremes of muscle mass (elderly, malnourished, amputation, bodybuilders) — request when creatinine-based eGFR seems discordant with clinical picture',
      'FGF-23: rises early in CKD (often before phosphate elevates) — important CKD-MBD biomarker',
      'ACR preferred over PCR for CKD monitoring: ACR detects early diabetic nephropathy better; PCR includes non-albumin proteins useful for myeloma screen',
      'Haematuria: if dipstick positive, CONFIRM with microscopy (to exclude false positives). Persistent haematuria + proteinuria → nephrology (possible GN)',
      'CKD progression: defined as >25% decline in eGFR or sustained change in eGFR category — triggers nephrology referral',
      'Urgent referral: eGFR <15, >5 mL/min/year decline, ACR >300 mg/mmol, suspected GN, AKI on CKD, difficult-to-control hypertension',

  {
    id:'nephron-ref',name:'Drug Targets — Nephron Reference',abbr:'Drug Targets',cat:'Quick Study',icon:'🔬',type:'study',
    summary:'Quick reference for drug mechanisms organised by nephron segment. Understanding where drugs act explains both their therapeutic effects and side effects in CKD. The nephron is also the framework for understanding electrolyte disorders — tracing which segment handles each electrolyte explains the pattern of drug-induced electrolyte disturbances.',
    pearls:[
      'PCT (Proximal Convoluted Tubule): reabsorbs ~67% of filtered Na⁺/water, all glucose, all amino acids, ~80% HCO₃. Carbonic anhydrase mediates HCO₃ reabsorption. SGLT2 mediates glucose/Na⁺ cotransport.',
      'SGLT2 inhibitors (PCT): block glucose+Na⁺ reabsorption → glycosuria → natriuresis → ↓RAAS → cardiorenal protection. Note: acute Cr rise on initiation is haemodynamic (reduced intraglomerular pressure) — do NOT stop.',
      'Acetazolamide (PCT): inhibits carbonic anhydrase → ↓HCO₃ reabsorption → bicarbonaturia → metabolic acidosis. ADVOR trial 2022: acetazolamide + loop diuretic improves decongestion in acute HF.',
      'Loop of Henle — TAL: NKCC2 cotransporter reabsorbs ~25% of filtered Na⁺. Frusemide/bumetanide block NKCC2 → natriuresis + calciuresis + magnesuresis. Countercurrent multiplication is abolished → loss of medullary concentration gradient.',
      'DCT (Distal Convoluted Tubule): NCC cotransporter (thiazide-sensitive). Thiazides block NCC → ↓Ca²⁺ excretion (thiazide-calcium paradox via TRPV5) → useful in hypercalciuria/nephrolithiasis. TRPM6 mediates Mg²⁺ reabsorption — PPIs inhibit TRPM6 → PPI-induced hypomagnesaemia.',
      'Collecting Duct: ENaC (epithelial Na channel) and principal cells — aldosterone upregulates ENaC. MRAs (spironolactone, eplerenone, finerenone) block aldosterone. Amiloride blocks ENaC directly. Intercalated cells: Type A secrete H⁺ (distal RTA if dysfunctional), Type B secrete HCO₃.',
      'ADH (V2 receptor, collecting duct): inserts AQP2 water channels → water reabsorption → urine concentration. Tolvaptan blocks V2R → aquaresis (free water excretion without natriuresis). Lithium blocks ADH action → nephrogenic DI.',
      'Gitelman syndrome: loss-of-function NCC mutation → hypoK⁺, hypoMg²⁺, metabolic alkalosis, hypocalciuria (mimics thiazide effect).',
      'Bartter syndrome: loss-of-function NKCC2 → hypoK⁺, metabolic alkalosis, hypercalciuria, normal/low BP (mimics frusemide effect).',
      'Liddle syndrome: gain-of-function ENaC → severe hypertension, hypoK⁺, metabolic alkalosis. Treat with amiloride (not spironolactone — ENaC constitutively active).',
    ],
    meds:[],
    monitoring:['Fanconi syndrome (generalised PCT dysfunction): glucosuria with normal BSL, phosphaturia, aminoaciduria, uricosuria, bicarbonaturia, type 2 (proximal) RTA. Key acquired cause: tenofovir disoproxil (TDF) → check urine glucose in all patients on TDF','RTA types: Type 1 (distal) — inability to acidify urine (<5.3); Type 2 (proximal) — bicarbonate wasting; Type 4 — hyperkalaemic (↓aldosterone effect or tubular resistance)','Urine electrolyte interpretation: urine Na <20 = avid Na retention (pre-renal/RAAS activation). Urine K >40 = renal K wasting (hyperaldosteronism, diuretics, Bartter/Gitelman)','Fractional excretion of Mg²⁺ (FEMg): >4% = renal Mg wasting (diuretics, PPIs, cisplatin, aminoglycosides, calcineurin inhibitors)'],
    dialysis:['Patients on HD are anuric — nephron-level physiology does not apply to solute handling. All electrolyte balance is through dialysis + dietary restriction.','However, nephron pharmacology still relevant: drugs that act on tubules (frusemide, thiazides) have limited benefit in anuric ESKD patients but may preserve residual renal function in early HD/PD patients','Residual renal function (RRF): important in both HD and PD — preserves phosphate/potassium/fluid handling. Avoid nephrotoxins, volume depletion, and contrast wherever possible.'],

{
  id:'fluid-prescribing',name:'Fluid Prescribing',abbr:'IV Fluids',cat:'Ward Reference',icon:'💧',type:'management',
  summary:'IV fluid selection depends on the clinical indication: resuscitation (replace intravascular volume), replacement (correct specific deficits), or maintenance. Plasmalyte 148 or Hartmann solution preferred over 0.9% NaCl for large-volume resuscitation — balanced crystalloids reduce hyperchloraemic acidosis. In CKD/ESKD, every fluid decision requires careful thought: volume overload is dangerous and Hartmann contains 5mmol/L K⁺.',
  pearls:[
    'Resuscitation: Plasmalyte 148 or Hartmann preferred over 0.9% NaCl for large volumes — balanced crystalloids reduce hyperchloraemic metabolic acidosis and AKI risk (SMART and SALT-ED trials)',
    '0.9% NaCl (normal saline): still appropriate for isolated Na⁺ depletion, hypochloraemia/metabolic alkalosis (e.g. vomiting), contrast nephropathy prophylaxis, and drug diluent',
    'Hartmann solution contains 5 mmol/L K⁺ — AVOID in hyperkalaemia and in ESKD/anuric patients',
    'Albumin 4%: indicated for SBP prophylaxis with large-volume paracentesis (>5L) in cirrhosis; not superior to crystalloids in most other settings (SAFE trial)',
    'Maintenance requirement: ~25–30 mL/kg/day water + 1 mmol/kg/day Na⁺ + 1 mmol/kg/day K⁺ + ~50–100g/day glucose (to prevent starvation ketosis)',
    'In CKD: restrict volume in CKD 4/5 and ESKD; avoid K⁺-containing fluids (Hartmann); target strict euvolaemia; daily fluid balance + weights',
    'Colloids (albumin, gelatin): not routinely superior to crystalloids for resuscitation — use crystalloids first',
    'Blood transfusion trigger: Hb <70 g/L in most patients (restrictive strategy); Hb <80 in ACS or symptomatic anaemia; Hb <100 in HD patients (EPO-managed)',
    'Post-operative fluids: avoid excessive 0.9% NaCl — causes dilutional hyperchloraemic acidosis; switch to oral intake or Plasmalyte as early as possible',
  ],

    {drug:'0.9% Sodium Chloride (Normal Saline)',route:'IV',use:'Hypovolaemia (when K⁺-free fluid needed); metabolic alkalosis; hypochloraemia; drug diluent',std:'Na 154 | Cl 154 | pH 5.0 | Osm 308',ckd3:{d:'Standard use for resuscitation and maintenance; avoid very large volumes (hyperchloraemia)',f:'safe'},ckd4:{d:'Safe for resuscitation; avoid Hartmann/Plasmalyte if hyperkalaemic; large volumes cause acidosis',f:'safe'},ckd5:{d:'Preferred resuscitation fluid in ESKD — no K⁺. Risk: sodium loading and volume overload',f:'adjust'},hd:{d:'Preferred for small-volume resuscitation in HD; strict volume accounting',f:'adjust'},pd:{d:'Can be used; volume overload risk still present (PD handles fluid)',f:'adjust'},note:'Supraphysiological Cl⁻ (154 vs plasma 98-106 mmol/L) — large volumes cause dilutional hyperchloraemic metabolic acidosis. Also associated with AKI in observational data (reduced renal afferent vasodilation). Still appropriate for specific indications.',src:'eTG + SMART trial'},

{
  id:'loop-of-henle',name:'Nephron Refresh',abbr:'Nephron Refresh',cat:'Quick Study',icon:'🧬',type:'diagram',diagramId:'nephron-targets',
  summary:'The loop of Henle creates the medullary osmotic gradient through countercurrent multiplication. The descending limb is water-permeable but solute-impermeable; the ascending limb is solute-permeable but water-impermeable. The thick ascending limb (TALH) is the site of NKCC2 — the target of loop diuretics (frusemide, bumetanide).',
  pearls:[
    'Countercurrent multiplication: the opposing flow in descending vs ascending limbs progressively concentrates the medullary interstitium from 300 mOsm/kg (cortex) to 1200 mOsm/kg (papilla)',
    'Descending thin limb (DTL): AQP1 water channels — freely water-permeable, impermeable to solutes. Tubular fluid CONCENTRATES as it descends',
    'Thick ascending limb (TALH): NKCC2 cotransporter (Na-K-2Cl) — solute-permeable, water-IMPERMEABLE. Tubular fluid DILUTES as it ascends',
    'NKCC2 is the target of loop diuretics: frusemide, bumetanide, torasemide. Blockade prevents NaCl reabsorption → loss of medullary gradient → dilute urine even with high ADH',
    'Macula densa: specialised TALH cells sensing luminal NaCl. Low NaCl → renin release (tubuloglomerular feedback). Also affected by frusemide (macula densa NaCl sensing → RAAS activation)',
    'ADH (vasopressin) acts on collecting duct AQP2 channels — DOWNSTREAM of the loop. The loop creates the gradient; ADH determines how much the collecting duct uses it',
    'Loop diuretics are the most potent diuretics — can eliminate up to 25% of filtered Na⁺ vs thiazides at 5-8%',
    'Bartter syndrome (types 1-3): loss-of-function mutations in NKCC2, ROMK, or ClC-Kb → phenocopies chronic frusemide use: hypokalaemia, metabolic alkalosis, hypercalciuria, normal BP',

{
  id:'hyponatraemia',quizTag:'acute',name:'Hyponatraemia',abbr:'Hyponatraemia',cat:'Acute Presentations',icon:'💧',type:'management',
  summary:'Hyponatraemia (Na⁺ <135 mmol/L) is the most common electrolyte disorder on the ward. Classification by volume status guides aetiology and management. The rate of correction is as important as the absolute level — correct too fast and you risk osmotic demyelination syndrome (ODS). Maximum correction: 10–12 mmol/L in 24h, 18 mmol/L in 48h.',
  pearls:[
    'First step always: confirm true hyponatraemia with paired serum and urine osmolality — exclude pseudohyponatraemia (hyperglycaemia, hyperlipidaemia, hyperproteinaemia)',
    'Classification by volume status: HYPOVOLAEMIC (vomiting, diarrhoea, diuretics, Addison) → EUVOLAEMIC (SIADH, hypothyroidism, psychogenic polydipsia) → HYPERVOLAEMIC (heart failure, cirrhosis, nephrotic syndrome, CKD/ESKD)',
    'SIADH diagnostic criteria: (1) serum osm <275, (2) urine osm >100, (3) urine Na >40, (4) euvolaemia, (5) no thyroid/adrenal disease, (6) no diuretics',
    'Urine Na <20 mmol/L + low urine osm: hypovolaemic (extrarenal losses) or psychogenic polydipsia',
    'Urine Na >40 mmol/L + urine osm >serum osm: SIADH (or renal salt-wasting, adrenal insufficiency)',
    'ODS (osmotic demyelination syndrome) risk factors: alcoholism, malnutrition, hypokalaemia, liver failure, severe hyponatraemia <120 for >48h — these patients need SLOWER correction (max 8 mmol/L/24h)',
    'Sydney protocol for 3% saline: 100mL over 10–20 min; can repeat twice if severe symptoms (seizure, coma, GCS drop); recheck Na hourly',
    '3% NaCl is ONLY for symptomatic severe hyponatraemia (seizures, coma, acute neurological deterioration) — not for asymptomatic chronic low Na',
    'Tolvaptan (V2R antagonist): useful in SIADH refractory to fluid restriction; do NOT use in liver disease or hypovolaemia; initiate in hospital only',
    'Overcorrection rescue: if Na rises too fast (>10–12 in 24h), give IV dextrose 5% 3mL/kg/h ± desmopressin 2mcg IV to re-lower Na and prevent ODS',
    'Adrenal insufficiency must be excluded before diagnosing SIADH — cortisol stimulation test in any unexplained SIADH',
    'Hypothyroidism can cause hyponatraemia — check TSH in all unexplained hyponatraemia',
  ],

    {drug:'Fluid restriction',route:'Oral',use:'First-line for SIADH — restrict free water; target urine:plasma osm ratio <1',std:'500–800 mL/day total fluid intake (all sources). Stricter if urine osm >600 mOsm/kg.',ckd3:{d:'Standard; restrict if SIADH confirmed',f:'safe'},ckd4:{d:'Standard; patients may already be fluid restricted',f:'safe'},ckd5:{d:'SIADH less common in ESKD (dilutional is more common); assess carefully',f:'adjust'},hd:{d:'Standard interdialytic fluid restriction still applies; SIADH rare in anuric HD',f:'adjust'},pd:{d:'Balance restriction with PD requirements; discuss with nephrology',f:'adjust'},note:'Urine:plasma osm ratio >1 means patient is concentrating urine more than plasma → restriction must be below urine output. Calculate electrolyte-free water clearance for precise restriction.',src:'eTG + UpToDate'},

    {drug:'3% Hypertonic Saline',route:'IV',use:'SYMPTOMATIC severe hyponatraemia ONLY (seizures, coma, GCS <12) — Sydney protocol',std:'100 mL IV over 10–20 min. Can repeat twice. Check Na hourly. STOP when symptoms resolve.',ckd3:{d:'Use only for symptomatic; monitor Na hourly; risk of volume overload',f:'caution'},ckd4:{d:'Extreme caution; consider early nephrology involvement; HD may be needed',f:'caution'},ckd5:{d:'Generally avoid; HD with low-Na dialysate preferred for controlled correction',f:'avoid'},hd:{d:'Use HD with adjusted dialysate Na for controlled correction; 3% NaCl rarely needed',f:'avoid'},pd:{d:'Avoid; adjust PD approach with nephrology',f:'avoid'},note:'3% NaCl is reserved for LIFE-THREATENING symptoms only. Target: raise Na 5 mmol/L quickly to stop seizures/improve conscious state. Then PAUSE and reassess. Do NOT aim to normalise Na acutely. Max correction still 10–12 mmol/L/24h total.',src:'eTG — Sydney Protocol'},

  monitoring:['Na⁺ q2–4h initially in symptomatic or severe hyponatraemia; q6–8h once stable and in target correction range','Urine osmolality + urine Na: establish cause and monitor SIADH treatment response','ODS watch: any patient with risk factors — check Na at 12h AND 24h; if rising >10mmol/L/24h, administer D5W ± DDAVP to slow correction','Paired serum + urine osm at presentation to differentiate true vs pseudo and classify','Cortisol stimulation test + TSH: in all unexplained SIADH before attributing a cause','Daily weight: sensitive marker of volume status in hypervolaemic hyponatraemia','GCS/neurological status: headache, nausea, seizure, confusion → reassess rate of correction'],
  dialysis:['ESKD and dilutional hyponatraemia: control via dialysate Na adjustment — standard dialysate Na 138–140 mmol/L acts as a diffusive Na replacement','HD: if Na <125 and symptomatic, reduce dialysate Na to 145–148 temporarily (diffusion gradient corrects Na); control rate carefully over 2–3 sessions','PD: use higher-dextrose dialysate to generate more UF and improve dilutional hyponatraemia','SIADH is rare in anuric ESKD (no ADH effect without tubular function) — consider other causes','Hypertonic saline is almost never needed in ESKD — dialysis provides controlled correction'],

{
  id:'key-trials',name:'Key Trials',abbr:'Key Trials',cat:'Quick Study',icon:'📋',type:'study',
  summary:'Landmark RCTs that changed nephrology and cardiology practice. These trials form the evidence base for SGLT2 inhibitors, MR antagonists, GLP-1 agonists, and intensive BP control. DAPA-CKD, CREDENCE, and EMPA-KIDNEY established SGLT2i as renoprotective independent of diabetes. FIDELIO/FIGARO established finerenone in DKD.',
  pearls:[
    'DAPA-CKD (2020): Dapagliflozin 10mg vs placebo in CKD eGFR 25-75 + ACR >200 (75% T2DM, 25% non-DM). Primary composite (≥50% eGFR decline/ESKD/renal or CV death) reduced 39%. Benefit seen in both DM and non-DM groups. N Engl J Med 2020.',
    'CREDENCE (2019): Canagliflozin 100mg vs placebo in DKD eGFR 30-90 + ACR 300-5000. ESKD/doubling Cr/renal death reduced 30%. Trial stopped early — overwhelming benefit. N Engl J Med 2019.',
    'EMPA-KIDNEY (2023): Empagliflozin 10mg in broader CKD (eGFR 20-44 OR eGFR 45-90 + ACR ≥200). Progression of kidney disease or CV death reduced 28%. Benefit across all subgroups. N Engl J Med 2023.',
    'FIDELIO-DKD (2020): Finerenone 10-20mg vs placebo in DKD (T2DM + eGFR 25-75 + ACR ≥300 or eGFR 25-60 + ACR 30-300 + high PTH). Composite CKD progression reduced 18%; CV events reduced 14%. N Engl J Med 2020.',
    'FIGARO-DKD (2021): Finerenone in DKD with higher eGFR. CV composite (CV death/MI/stroke/HHF) reduced 13%. Together FIDELIO+FIGARO = FIDELITY meta-analysis: 23% relative risk reduction in CKD progression.',
    'DAPA-HF (2019): Dapagliflozin in HFrEF (EF ≤40%), regardless of DM status. Worsening HF or CV death reduced 26%. Landmark — established SGLT2i in HF independently of glucose control. N Engl J Med 2019.',
    'EMPEROR-Preserved (2021): Empagliflozin in HFpEF (EF >40%). CV death or HHF reduced 21%. First drug to show significant benefit in HFpEF. N Engl J Med 2021.',
    'DELIVER (2022): Dapagliflozin in HFpEF (EF >40%). CV death/worsening HF reduced 18%. Together with EMPEROR-Preserved confirmed SGLT2i benefit across the EF spectrum.',
    'SPRINT (2015): Intensive BP target (systolic <120) vs standard (<140) in high CV risk patients without DM. 25% reduction in CV events; 27% reduction in all-cause mortality. Trial stopped early. Established <130/80 target. N Engl J Med 2015.',
    'ONTARGET (2008): Telmisartan vs ramipril vs COMBINATION in high CV risk. Dual RAAS blockade (ACEi + ARB) offered no additional CV benefit but increased AKI, hypotension, hyperkalaemia. Do NOT combine ACEi + ARB. N Engl J Med 2008.',
    'ADVOR (2022): Acetazolamide added to loop diuretics in acute decompensated HF. Successful decongestion at 3 days 46.9% vs 37.2% (p=0.003). Supports acetazolamide + frusemide combination in diuretic resistance. N Engl J Med 2022.',
    'FLOW (2024): Semaglutide 1mg weekly in T2DM + CKD (eGFR 50-75, ACR >300 OR eGFR 25-50). Kidney disease progression or CV death reduced 24%. Established GLP-1 RA as renoprotective alongside SGLT2i. N Engl J Med 2024.',
  ],
  monitoring:['SGLT2i monitoring: check eGFR + electrolytes 2-4 weeks after starting; expect transient eGFR dip of 3-5 points (haemodynamic, not harmful — do not stop)','Finerenone monitoring: K⁺ must be ≤4.8 before starting; recheck at 4 weeks; target K⁺ ≤5.0 to continue','Initial eGFR dip with RAAS + SGLT2i combination: acceptable if within 30% of baseline and K⁺ stable','For all major cardiorenal trials: benefit on hard outcomes (ESKD, CV death) takes months to emerge; early tolerability is what to focus on'],
  dialysis:['SGLT2i: no role in eGFR <20 or dialysis (insufficient tubular mass for mechanism)','Finerenone: not studied in dialysis populations; avoid','GLP-1 RA: limited data in dialysis; GI side effects risk dehydration in HD patients — use with caution'],
},
{
  id:'scenarios',name:'Clinical Scenarios',abbr:'Scenarios',cat:'Quick Study',icon:'🏥',type:'scenarios',
  summary:'Ward-based clinical scenarios. Read the case, think through your approach, then reveal the answer. These are designed to test clinical reasoning, not just recall.',
  cases:[
    {
      title:'Case 1: K⁺ 7.1 with ECG changes',
      stem:'68M, ESKD on HD. Brought in by ambulance after missing two HD sessions. BP 155/96, HR 58. ECG: peaked T waves, widened QRS (0.14s), sine-wave pattern developing. K⁺ 7.1 mmol/L, Na 129, HCO₃ 14. What are your immediate priorities IN ORDER?',
      answer:'1. IV 10% Calcium gluconate 10mL over 5–10 min FIRST (cardiac membrane stabilisation — onset 1–3 min). 2. Salbutamol 10mg nebulised (shifts K⁺ into cells, onset 15–20 min, lowers K⁺ ~0.6 mmol/L). 3. IV 50% dextrose + short-acting insulin if needed. 4. Urgent HD — this is the only definitive treatment in ESKD (no kidneys to excrete K⁺). 5. Continuous cardiac monitoring throughout. Key insight: calcium does NOT lower K⁺ — it only protects the heart. You still need to remove K⁺ definitively.',
      tags:['hyperkalaemia','hd']
    },
    {
      title:'Case 2: Post-contrast AKI prevention',
      stem:'72F, CKD3b (eGFR 36), T2DM on metformin 1g BD and lisinopril 10mg. Scheduled for CT aortogram with contrast tomorrow morning. What medications do you need to address, and what else would you do?',
      answer:'STOP metformin NOW — restart 48h post-procedure only if eGFR stable (lactic acidosis risk with AKI). HOLD lisinopril on day of procedure (reduces renal autoregulation under contrast stress — restart after 48h when Cr stable). IV hydration: 0.9% NaCl or NaHCO₃ 1–1.5 mL/kg/hr for 3–12h pre-procedure and 6h post-procedure. Avoid NSAIDs, other nephrotoxins. Check eGFR 48–72h post-procedure. Oral hydration is acceptable in low-risk CKD3a if IV not feasible.',
      tags:['aki-workup','contrast']
    },
    {
      title:'Case 3: Resistant hyponatraemia',
      stem:'58F with small cell lung carcinoma on chemotherapy. Na 119 mmol/L (was 121 two days ago). Alert and oriented. Serum osm 249, urine osm 524, urine Na 68 mmol/L. No oedema. BP 118/76. Current fluid restriction to 1L/day started 48h ago. What do you do next?',
      answer:'SIADH confirmed (low serum osm, inappropriately concentrated urine, elevated urine Na, euvolaemic). Na NOT improving despite restriction — this is refractory SIADH. Options: (1) Tighten restriction to 500-700mL/day AND add high-solute feeds (urea or salt tablets increase free water excretion — practical and underused). (2) Consider tolvaptan 15mg PO in hospital setting with hourly Na monitoring. (3) If symptoms develop (seizure, confusion) — 3% NaCl 100mL over 10–20 min (Sydney protocol). Key: Na 119 asymptomatic → no rush to use hypertonic saline. Most important: find and treat the underlying cause (SCLC — first-line SIADH cause).',
      tags:['hyponatraemia','siadh']
    },
    {
      title:'Case 4: Metabolic acidosis on the ward',
      stem:'45M with T1DM admitted with vomiting × 3 days. Looks unwell. Na 136, K 3.2, Cl 90, HCO₃ 8, pH 7.14, PaCO₂ 22, albumin 34. Calculate his anion gap, correct for albumin, then calculate delta-delta. What is your diagnosis?',
      answer:'AG = Na - Cl - HCO₃ = 136 - 90 - 8 = 38. Albumin correction: 38 + 2.5×(40-34) = 38 + 15 = 53 (massively elevated). Delta-delta = (corrected AG - 12)/(24 - HCO₃) = (53-12)/(24-8) = 41/16 = 2.56. Delta-delta >2 = HAGMA PLUS concurrent metabolic alkalosis (the vomiting caused HCl loss → metabolic alkalosis which partially masks the degree of HCO₃ drop from DKA). Diagnosis: DKA with concurrent metabolic alkalosis from vomiting. The metabolic alkalosis buffered some of the HCO₃ drop — without vomiting, HCO₃ would be even lower. Winters formula: expected PaCO₂ = 1.5×8+8±2 = 20±2. Measured 22 = adequate respiratory compensation.',
      tags:['abg-ref','metabolic-acidosis']
    },
    {
      title:'Case 5: Post-transplant fever at 6 weeks',
      stem:'34M, 6 weeks post deceased-donor renal transplant. On tacrolimus 6mg BD (level 12 ng/mL), MMF 1g BD, prednisolone 10mg. Presents with fever 38.8°C, fatigue, mild dyspnoea. Hb 102, WCC 3.2, creatinine stable at 145 (baseline 130). What is your workup?',
      answer:'Transplant fever at 6 weeks — infectious workup first. CMV PCR (D+/R- or D+/R+ — peak at 1-3 months; key risk), BK PCR (BK nephropathy causes graft dysfunction), EBV PCR (PTLD risk), blood cultures ×2, urinalysis + MCS, CXR. Also check PJP (LDH, CT chest), Nocardia if consolidation. Check tacrolimus level (12 is therapeutic). Consider BAL if respiratory symptoms. Non-infectious: rejection (would show rising creatinine — check more carefully), drug hypersensitivity. If unwell: start empirical antibiotics after cultures. Do NOT reduce immunosuppression empirically without identifying a cause — rejection risk.',
      tags:['transplant-fever']
    },
    {
      title:'Case 6: Diuretic resistance in HF/CKD',
      stem:'77F, HFrEF EF 30%, CKD3a (eGFR 48). On frusemide 80mg PO BD for 2 weeks with inadequate response — weight up 4kg, bilateral oedema to knees, creatinine 165 (baseline 130). What strategies would you use for diuresis?',
      answer:'Diuretic resistance approach: (1) IV frusemide — bioavailability of oral frusemide is variable (10-90%); switch to IV 80mg BD equivalent. (2) If still inadequate: add metolazone 2.5–5mg PO 30–60 min BEFORE frusemide (sequential nephron blockade — distal + loop). Watch for profound diuresis. (3) Consider acetazolamide 500mg IV daily (ADVOR trial — enhances loop diuretic response). (4) Monitor UO hourly; target 3–5 mL/kg/hr. (5) The Cr rise of 35 points (165 vs 130) is ACCEPTABLE cardiorenal syndrome pattern — do not stop diuresis if UO is good. Track lactate/JVP/BP to ensure forward flow maintained. (6) SGLT2i (if eGFR ≥20) can be added for additional natriuresis and cardiorenal benefit.',
      tags:['acute-hf','fluid-prescribing']
    },
  ],
  pearls:[],meds:[],monitoring:[],dialysis:[],
},
